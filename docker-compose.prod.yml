services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carhub}
      POSTGRES_USER: ${POSTGRES_USER:-carhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carhub} -d ${POSTGRES_DB:-carhub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      CARHUB_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-carhub}
      CARHUB_DB_USER: ${POSTGRES_USER:-carhub}
      CARHUB_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      CARHUB_JWT_SECRET: ${CARHUB_JWT_SECRET:?Set CARHUB_JWT_SECRET in .env.production}
      CARHUB_TOKEN_HOURS: ${CARHUB_TOKEN_HOURS:-12}
      CARHUB_CORS_ALLOWED_ORIGINS: https://aitourism.in,https://www.aitourism.in,https://admin.aitourism.in,https://provider.aitourism.in
      CARHUB_GOOGLE_CLIENT_ID: ${CARHUB_GOOGLE_CLIENT_ID:-}
      CARHUB_MAIL_USERNAME: ${CARHUB_MAIL_USERNAME:-}
      CARHUB_MAIL_PASSWORD: ${CARHUB_MAIL_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_CURRENCY: ${RAZORPAY_CURRENCY:-INR}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://aitourism.in/api/v1
        VITE_PROVIDER_APP_URL: https://provider.aitourism.in
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./admin-frontend
      args:
        VITE_API_BASE_URL: https://aitourism.in/api/v1
    restart: unless-stopped

  provider-frontend:
    build:
      context: ./provider-frontend
      args:
        VITE_API_BASE_URL: https://aitourism.in/api/v1
        VITE_CUSTOMER_APP_URL: https://aitourism.in
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./nginx/aitourism.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - admin-frontend
      - provider-frontend

  certbot:
    image: certbot/certbot:latest
    profiles: ["certificate"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  postgres-data:
