name: Deploy Production

on:
  workflow_run:
    workflows: ["CarHub CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: aitourism-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check required production secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=()
          [ -z "$SSH_HOST" ] && missing+=("SSH_HOST")
          [ -z "$SSH_USER" ] && missing+=("SSH_USER")
          [ -z "$SSH_PRIVATE_KEY" ] && missing+=("SSH_PRIVATE_KEY")
          [ -z "$DEPLOY_PATH" ] && missing+=("DEPLOY_PATH")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub production environment secret(s): ${missing[*]}"
            echo "Add them under Settings > Environments > production > Environment secrets."
            exit 1
          fi

      - name: Deploy to VPS with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
