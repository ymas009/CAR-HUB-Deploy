services:
  postgres:
    image: postgres:16-alpine
    container_name: carhub-postgres
    environment:
      POSTGRES_DB: carhub
      POSTGRES_USER: carhub
      POSTGRES_PASSWORD: carhub
    ports:
      - "5432:5432"
    volumes:
      - carhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carhub -d carhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      CARHUB_DB_URL: jdbc:postgresql://postgres:5432/carhub
      CARHUB_DB_USER: carhub
      CARHUB_DB_PASSWORD: carhub
      CARHUB_JWT_SECRET: replace-with-a-long-random-secret-before-production
      CARHUB_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:8088,http://localhost:8089
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./admin-frontend
    ports:
      - "8089:80"
    depends_on:
      - backend

volumes:
  carhub-postgres-data:
