server {
  listen 80;
  server_name aitourism.in www.aitourism.in admin.aitourism.in provider.aitourism.in;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 200 "HTTPS certificate setup in progress.\n";
    add_header Content-Type text/plain;
  }
}
