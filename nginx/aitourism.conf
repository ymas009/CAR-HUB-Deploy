server {
  listen 80;
  server_name aitourism.in www.aitourism.in admin.aitourism.in provider.aitourism.in;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name aitourism.in www.aitourism.in;

  ssl_certificate /etc/letsencrypt/live/aitourism.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aitourism.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;

  client_max_body_size 10m;

  location /api/ {
    proxy_pass http://backend:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name admin.aitourism.in;

  ssl_certificate /etc/letsencrypt/live/aitourism.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aitourism.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;

  location / {
    proxy_pass http://admin-frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name provider.aitourism.in;

  ssl_certificate /etc/letsencrypt/live/aitourism.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aitourism.in/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;

  location / {
    proxy_pass http://provider-frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
