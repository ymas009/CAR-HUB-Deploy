server:
  port: 8080

spring:
  application:
    name: carhub-backend
  datasource:
    url: ${CARHUB_DB_URL:jdbc:postgresql://localhost:5432/carhub}
    username: ${CARHUB_DB_USER:carhub}
    password: ${CARHUB_DB_PASSWORD:carhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

carhub:
  cors:
    allowed-origins: ${CARHUB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8088,http://localhost:8089}
  security:
    provider-access-default-hours: 72
    jwt-secret: ${CARHUB_JWT_SECRET:dev-only-change-this-secret-before-production}
    token-hours: ${CARHUB_TOKEN_HOURS:12}
