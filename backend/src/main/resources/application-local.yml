spring:
  datasource:
    url: jdbc:h2:mem:carhub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CARHUB_MAIL_USERNAME:}
    password: ${CARHUB_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
  flyway:
    enabled: false

carhub:
  google:
    client-id: ${CARHUB_GOOGLE_CLIENT_ID:}
  security:
    jwt-secret: local-dev-secret-change-before-production

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  currency: ${RAZORPAY_CURRENCY:INR}
